spring:
  application:
    name: matchmaking

  datasource:
    url: jdbc:mysql://database-2.chasis6a0sx0.ap-south-1.rds.amazonaws.com:3306/matchmaking?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: admin
    password: databaseis100%SECURE

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  scheduling:
    enabled: true                  # required for @Scheduled jobs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

thirdparty:
  clearbit:
    autocomplete-url: https://autocomplete.clearbit.com/v1/companies/suggest

webrtc:
  stun:
    url: ${STUN_URL:stun:stun.l.google.com:19302}
  turn:
    url: ${TURN_URL:turn:relay.metered.ca:80}
    username: ${TURN_USERNAME:changeme}
    credential: ${TURN_CREDENTIAL:changeme}

# Meeting fixed slot window (7 PM – 9 PM IST daily)
meeting:
  slot:
    hour: 19
    durationMinutes: 30