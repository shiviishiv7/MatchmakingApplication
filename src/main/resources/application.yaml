spring:
  application:
    name: matchmaking

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  scheduling:
    enabled: true

  mail:
    host: ${MAIL_HOST:email-smtp.us-east-1.amazonaws.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

thirdparty:
  clearbit:
    autocomplete-url: https://autocomplete.clearbit.com/v1/companies/suggest

zoom:
  account:
    id: ${ZOOM_ACCOUNT_ID:}
  client:
    id: ${ZOOM_CLIENT_ID:}
    secret: ${ZOOM_CLIENT_SECRET:}
  host:
    email: ${ZOOM_HOST_EMAIL:}

meeting:
  slot:
    hour: 19
    durationMinutes: 30

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
    model: claude-haiku-4-5-20251001

app:
  mail:
    from: ${MAIL_FROM:noreply@matchmaking.app}
    enabled: ${MAIL_ENABLED:false}
