spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/matchmaking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Root@1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:local-dev-key-not-set}

logging:
  level:
    com.shiviishiv7.matchmaking: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
